<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Engagement Anniversary</title>
  <script src="https://cdn.jsdelivr.net/npm/fireworks-js/dist/fireworks.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: #ff0000; /* Red background */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      overflow: hidden;
      text-align: center;
      color: #fff;
    }

    #message {
      font-size: 2em;
      margin: 20px;
      max-width: 90%;
      transition: opacity 0.5s ease;
    }

    #surpriseButton {
      padding: 15px 30px;
      font-size: 1.2em;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      background-color: #fff;
      color: #ff0000;
      cursor: pointer;
      margin-top: 30px;
      transition: transform 0.2s;
    }

    #surpriseButton:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <!-- Initial Message -->
  <div id="message">
    Happy Engagement Anniversary ❤️ Mubashara! Wishing you endless love and happiness
  </div>

  <!-- Open Surprise Button -->
  <button id="surpriseButton">Open Surprise 🎁</button>

  <script>
    let fireworks;

    function startFireworks() {
      const container = document.body;
      fireworks = new Fireworks(container, {
        rocketsPoint: 50,
        trace: 3,
        explosion: 5,
        intensity: 30,
        gravity: 2.0,
        flickering: true,
        boundaries: { x: 0, y: 0, width: container.clientWidth, height: container.clientHeight },
      });
      fireworks.start();
    }

    function surpriseAction() {
      // Change message
      const message = document.getElementById("message");
      message.textContent = 
        "Happy Engagement Anniversary Fazi ❤️ Mubashara! Wishing you endless love and happiness";

      // Start fireworks
      startFireworks();
    }

    // Button click event
    document.getElementById("surpriseButton").addEventListener("click", surpriseAction);
  </script>

</body>
</html>
