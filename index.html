<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Engagement Anniversary</title>
  <!-- Fireworks library -->
  <script src="https://cdn.jsdelivr.net/npm/fireworks-js/dist/fireworks.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #ff0000; /* Red background */
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
      text-align: center;
    }
    h1 {
      font-size: 2em;
      z-index: 10;
      position: relative;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 1em;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #fff;
      color: #ff0000;
      font-weight: bold;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <h1>Happy Engagement Anniversary Fazi ❤️ Mubashara!</h1>
  <div>
    <button onclick="sendWhatsApp()">Send WhatsApp Wishes</button>
    <button onclick="surprise()">Open Surprise 🎁</button>
  </div>

  <script>
    // WhatsApp button
    function sendWhatsApp() {
      const message = "Happy Engagement Anniversary Fazi ❤️ Mubashara! Wishing you endless love and happiness.";
      const url = "https://wa.me/?text=" + encodeURIComponent(message);
      window.open(url, '_blank');
    }

    // Surprise button
    function surprise() {
      alert("🎉 Surprise! Happy Engagement Anniversary Fazi ❤️ Mubashara! 🎉");

      // Trigger fireworks again
      const container = document.body;
      const fireworks = new Fireworks(container, {
        rocketsPoint: 50,
        trace: 3,
        explosion: 5,
        intensity: 30,
        gravity: 2.0,
        flickering: true,
        boundaries: { x: 0, y: 0, width: container.clientWidth, height: container.clientHeight },
      });
      fireworks.start();
    }

    // Fireworks on page load
    window.onload = function() {
      const container = document.body;
      const fireworks = new Fireworks(container, {
        rocketsPoint: 50,
        trace: 3,
        explosion: 5,
        intensity: 30,
        gravity: 2.0,
        flickering: true,
        boundaries: { x: 0, y: 0, width: container.clientWidth, height: container.clientHeight },
      });
      fireworks.start();
    };
  </script>
</body>
</html>
