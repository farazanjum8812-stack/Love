<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Engagement Anniversary</title>
  <script src="https://cdn.jsdelivr.net/npm/fireworks-js/dist/fireworks.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: #ff0000; /* Red background */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      overflow: hidden;
      text-align: center;
      color: #fff;
    }

    #message {
      font-size: 2em;
      margin: 20px;
      max-width: 90%;
      z-index: 10;
      position: relative;
      transition: opacity 0.5s ease;
    }

    #giftBox {
      width: 120px;
      height: 120px;
      background: url('https://i.imgur.com/OH6F0P8.png') no-repeat center center;
      background-size: contain;
      cursor: pointer;
      margin: 20px;
      z-index: 10;
      animation: bounce 1s infinite alternate;
    }

    @keyframes bounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-15px); }
    }
  </style>
</head>
<body>

  <!-- Initial Message -->
  <div id="message">
    Happy Engagement Anniversary ❤️ Mubashara! Wishing you endless love and happiness
  </div>

  <!-- Gift Box -->
  <div id="giftBox" title="Click me for your surprise!"></div>

  <script>
    let fireworks;

    function startFireworks() {
      const container = document.body;
      fireworks = new Fireworks(container, {
        rocketsPoint: 50,
        trace: 3,
        explosion: 5,
        intensity: 30,
        gravity: 2.0,
        flickering: true,
        boundaries: { x: 0, y: 0, width: container.clientWidth, height: container.clientHeight },
      });
      fireworks.start();
    }

    function giftBoxClicked() {
      // Change message
      const message = document.getElementById("message");
      message.textContent = "❤️ Mubashara

💖 Happy Engagement Anniversary 💖

Fazi ❤️ Mubashara
30 March 2024

My Dearest Love,

From the very moment you entered my life, everything became brighter, warmer, and more beautiful.
You are not just my fiancé—you are my heart, my joy, my safe place, my forever.

Every single day with you feels like a dream I never want to end.
On this special day, I want to remind you just how deeply and endlessly I love you.

✨ I promise to never leave your side ✨

No matter what life brings, I will always be here, standing with you, loving you, and cherishing every moment with you.

Happy Engagement Anniversary, my love 💍❤️
Forever and always yours,
Fazi 💫";

      // Start fireworks
      startFireworks();
    }

    document.getElementById("giftBox").addEventListener("click", giftBoxClicked);
  </script>

</body>
</html>
